name: Deploy to Hostinger

on:
  push:
    branches:
      - main  # or your default branch name

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: |
          npm run build
          echo "Listing dist contents after build:"
          ls -la dist/

      - name: List files (Debug)
        run: ls -R

      # Use FTP/FTPS to deploy to Hostinger
      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./
          # We exclude node_modules because we usually run npm install on the server
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .env
